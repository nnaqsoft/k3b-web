# Example compose file. Copy to docker-compose.yml and edit for your host.
# Every value here is an EXAMPLE. Nothing host-specific is baked into the image.
#
# Before you start:
#   1. Find your burner's block device:        ls -l /dev/sr* /dev/cdrom
#   2. Find its matching SCSI-generic node:     ls -l /dev/sg*   (or: cdrecord -scanbus)
#      The sg number varies per host, so map the one that matches YOUR drive.
#
services:
  k3b:
    image: spoisseroux/k3b-web:latest
    container_name: k3b
    # Required for K3b to detect the drive: it lists drives via udisks2/udev, and
    # the in-container udev daemon needs to write to /sys and the udev database.
    # See the README "Drive detection requires elevated privileges" section.
    privileged: true
    ports:
      - "5800:5800"                  # open http://<host>:5800 in a browser
    devices:
      - /dev/sr0:/dev/sr0            # block device (replace with your burner)
      - /dev/sg0:/dev/sg0            # SCSI-generic node (replace with YOUR sg node)
    volumes:
      - ./config:/config:rw          # persistent app settings
      - ./media:/storage:rw          # your source files and rip/image output
    environment:
      # CJK fonts (Japanese/Chinese/Korean) are baked into the image, so
      # ENABLE_CJK_FONT is not needed.
      - DARK_MODE=1                  # dark web UI and Qt theme (via adwaita-qt)
      - WEB_FILE_MANAGER=1           # browse /storage from the browser
      # - USER_ID=1000               # match the owner of your source files
      # - GROUP_ID=1000
      # - TZ=America/New_York
      # - SUP_GROUP_IDS=24           # manual fallback if device GID autodetect fails
    # 'privileged: true' above already covers SCSI access. If you scope it down to
    # capabilities instead, you need at least SYS_ADMIN (for udev) and often SYS_RAWIO
    # (for raw SCSI writes):
    # cap_add:
    #   - SYS_ADMIN
    #   - SYS_RAWIO
    restart: unless-stopped
